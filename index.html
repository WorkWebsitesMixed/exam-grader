<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam Grader</title>

    <style>
        :root {
            --primary: #1F4E78;
            --secondary: #27AE60;
            --ygg: #8E44AD;
            --bg: #F8FAFC;
            --border: #E2E8F0;
            --text: #0F172A;
            --muted: #64748B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        .icon { font-size: 56px; margin-bottom: 20px; }

        h1 { color: var(--primary); font-size: 26px; margin-bottom: 8px; }

        .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 36px; line-height: 1.6; }

        .btn-group { display: flex; flex-direction: column; gap: 14px; }

        .btn {
            display: block;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .btn-student {
            background: var(--secondary);
            color: white;
        }

        .btn-results {
            background: var(--surface);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-admin {
            background: var(--primary);
            color: white;
        }

        .no-src {
            background: #FFF8E1;
            border: 1px solid #FFE082;
            border-radius: 10px;
            padding: 20px;
            font-size: 14px;
            color: #6D4C41;
            margin-top: 16px;
            text-align: left;
            line-height: 1.7;
        }

        .no-src code {
            background: #FFF3CD;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        footer {
            margin-top: 32px;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon">📝</div>
        <h1 id="pageTitle">AI Exam Grader</h1>
        <p class="subtitle" id="pageSubtitle">Select your role to continue.</p>

        <div class="btn-group" id="btnGroup"></div>
    </div>

    <footer>AI-powered grading for Design &amp; Technology</footer>

    <script>
        var params = new URLSearchParams(window.location.search);
        var src = params.get('src') || '';

        var btnGroup = document.getElementById('btnGroup');

        if (src) {
            var encoded = encodeURIComponent(src);

            var studentLink = document.createElement('a');
            studentLink.href = 'grader.html?src=' + encoded;
            studentLink.className = 'btn btn-student';
            studentLink.textContent = '🎓 Start Exam (Student)';

            var resultsLink = document.createElement('a');
            resultsLink.href = 'results.html?src=' + encoded;
            resultsLink.className = 'btn btn-results';
            resultsLink.textContent = '📋 My Results (Student)';

            var adminLink = document.createElement('a');
            adminLink.href = 'admin.html?src=' + encoded;
            adminLink.className = 'btn btn-admin';
            adminLink.textContent = '🔧 Admin Panel (Teacher)';

            btnGroup.appendChild(studentLink);
            btnGroup.appendChild(resultsLink);
            btnGroup.appendChild(adminLink);
        } else {
            document.getElementById('pageSubtitle').textContent =
                'An AI-powered exam grading tool for schools.';

            var notice = document.createElement('div');
            notice.className = 'no-src';
            notice.innerHTML =
                '<strong>For teachers:</strong> open this page with your Apps Script URL as a parameter:<br><br>' +
                '<code>index.html?src=YOUR_APPS_SCRIPT_URL</code><br><br>' +
                'That link becomes your hub — bookmark it and share the student version with your class.';
            btnGroup.appendChild(notice);
        }
    </script>

</body>

</html>
